schema: spec-driven

context: |
  Cofinance is a Kotlin Multiplatform personal finance app using Compose Multiplatform,
  MVVM, Clean Architecture, Koin, Supabase, and PowerSync. Supported targets are Android
  and iOS device/simulator.

  OpenSpec is mandatory for every implementation change. Implementation must be associated
  with one named, apply-ready change, and agents must follow the Mandatory OpenSpec Workflow
  in AGENTS.md. Goal-driven work is not complete until every in-scope task and requirement is
  verified, relevant tests/builds pass, strict OpenSpec validation passes, and applicable delta
  specs are synchronized to main specs.

  Secrets from local.properties or environment variables must never be committed or logged.

rules:
  proposal:
    - Preserve the full user request or goal scope; do not narrow it to existing implementation.
    - Identify affected existing capabilities and explicit non-goals.
  design:
    - Ground decisions in current code and include platform-specific consequences for affected KMP targets.
    - Define verification evidence for every supported platform affected by the change.
  specs:
    - Write testable requirements and scenarios that describe observable behavior rather than implementation intent.
  tasks:
    - Map every task to proposal, design, or specification scope and include proportional verification.
    - Do not mark a task complete until its implementation and verification evidence both succeed.
