name: CD - Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: 'New internal build'

concurrency:
  group: cd-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build & Distribute Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          supabase.project_url=${{ secrets.SUPABASE_PROJECT_URL }}
          supabase.public_api_key=${{ secrets.SUPABASE_PUBLIC_API_KEY }}
          gemini.api_key=${{ secrets.GEMINI_API_KEY }}
          google_auth_client_id=${{ secrets.GOOGLE_AUTH_CLIENT_ID }}
          powersync.url=${{ secrets.POWERSYNC_URL }}
          sdk.dir=$ANDROID_HOME
          EOF

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/keystore.jks

      - name: Build Release APK
        run: ./gradlew :androidApp:assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.GOOGLE_SERVICE_JSON }}
          groups: internal-testers
          file: androidApp/build/outputs/apk/release/androidApp-release.apk
          releaseNotes: |
            ${{ github.event.inputs.release_notes || format('Build #{0} from {1}', github.run_number, github.ref_name) }}

            Commit: ${{ github.sha }}
