name: CD - Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: 'New internal build'

concurrency:
  group: cd-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build & Distribute Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          supabase.project_url=${{ secrets.SUPABASE_PROJECT_URL }}
          supabase.public_api_key=${{ secrets.SUPABASE_PUBLIC_API_KEY }}
          gemini.api_key=${{ secrets.GEMINI_API_KEY }}
          google_auth_client_id=${{ secrets.GOOGLE_AUTH_CLIENT_ID }}
          powersync.url=${{ secrets.POWERSYNC_URL }}
          sdk.dir=$ANDROID_HOME
          EOF

      - name: Build Release APK
        run: ./gradlew :androidApp:assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Validate Firebase App Distribution credentials
        id: firebase_distribution
        shell: bash
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_JSON }}
        run: |
          set -euo pipefail

          if [ -z "${FIREBASE_APP_ID_ANDROID:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Firebase App Distribution because FIREBASE_APP_ID_ANDROID is not configured."
            exit 0
          fi

          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Firebase App Distribution because GOOGLE_SERVICE_JSON is not configured."
            exit 0
          fi

          firebase_service_account_json=""

          if firebase_service_account_json="$(printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode 2>/dev/null)"; then
            :
          elif firebase_service_account_json="$(printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON_BASE64" | base64 -D 2>/dev/null)"; then
            :
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Firebase App Distribution because GOOGLE_SERVICE_JSON is not valid base64."
            exit 0
          fi

          firebase_service_account_type="$(
            FIREBASE_SERVICE_ACCOUNT_JSON="$firebase_service_account_json" \
            ruby -rjson -e 'print(JSON.parse(ENV.fetch("FIREBASE_SERVICE_ACCOUNT_JSON")).fetch("type", ""))' 2>/dev/null || true
          )"

          if [ "$firebase_service_account_type" != "service_account" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Firebase App Distribution because GOOGLE_SERVICE_JSON is not a service account credential."
            exit 0
          fi

          firebase_service_account_path="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$firebase_service_account_json" > "$firebase_service_account_path"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "service_account_path=$firebase_service_account_path" >> "$GITHUB_OUTPUT"

      - name: Upload to Firebase App Distribution
        if: steps.firebase_distribution.outputs.enabled == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFile: ${{ steps.firebase_distribution.outputs.service_account_path }}
          groups: internal-testers
          file: androidApp/build/outputs/apk/release/androidApp-release.apk
          releaseNotes: |
            ${{ github.event.inputs.release_notes || format('Build #{0} from {1}', github.run_number, github.ref_name) }}

            Commit: ${{ github.sha }}
