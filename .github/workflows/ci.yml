name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          supabase.project_url=${{ secrets.SUPABASE_PROJECT_URL }}
          supabase.public_api_key=${{ secrets.SUPABASE_PUBLIC_API_KEY }}
          gemini.api_key=${{ secrets.GEMINI_API_KEY }}
          google_auth_client_id=${{ secrets.GOOGLE_AUTH_CLIENT_ID }}
          powersync.url=${{ secrets.POWERSYNC_URL }}
          sdk.dir=$ANDROID_HOME
          EOF

      - name: Provision Android Firebase configuration
        shell: bash
        env:
          FIREBASE_ANDROID_CONFIG_BASE64: ${{ secrets.FIREBASE_ANDROID_CONFIG_BASE64 }}
          FIREBASE_ANDROID_PACKAGE_NAME: id.andriawan.cofinance
          FIREBASE_ANDROID_CONFIG_PATH: androidApp/google-services.json
        run: |
          set -euo pipefail

          if [ -z "${FIREBASE_ANDROID_CONFIG_BASE64:-}" ]; then
            echo "::error::FIREBASE_ANDROID_CONFIG_BASE64 is not configured."
            exit 1
          fi

          ruby -rbase64 -rjson -e '
            begin
              encoded = ENV.fetch("FIREBASE_ANDROID_CONFIG_BASE64").delete("\r\n")
              decoded = Base64.strict_decode64(encoded)
              config = JSON.parse(decoded)
              package_name = ENV.fetch("FIREBASE_ANDROID_PACKAGE_NAME")
              matching_client = config.fetch("client").any? do |client|
                client.dig("client_info", "android_client_info", "package_name") == package_name
              end
              raise "package mismatch" unless matching_client
              File.binwrite(ENV.fetch("FIREBASE_ANDROID_CONFIG_PATH"), decoded)
            rescue StandardError
              warn "Android Firebase configuration is invalid or does not match the application package."
              exit 1
            end
          '

      - name: Run Android Lint
        run: ./gradlew :androidApp:lint --no-daemon

      - name: Run Unit Tests
        run: ./gradlew :composeApp:allTests :androidApp:testDebugUnitTest --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: androidApp/build/reports/lint-results-*.html
          if-no-files-found: ignore

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: composeApp/build/reports/tests/
          if-no-files-found: ignore
