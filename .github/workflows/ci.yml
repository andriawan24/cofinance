name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          supabase.project_url=${{ secrets.SUPABASE_PROJECT_URL }}
          supabase.public_api_key=${{ secrets.SUPABASE_PUBLIC_API_KEY }}
          gemini.api_key=${{ secrets.GEMINI_API_KEY }}
          google_auth_client_id=${{ secrets.GOOGLE_AUTH_CLIENT_ID }}
          powersync.url=${{ secrets.POWERSYNC_URL }}
          sdk.dir=$ANDROID_HOME
          EOF

      - name: Run Android Lint
        run: ./gradlew :androidApp:lint --no-daemon

      - name: Run Unit Tests
        run: ./gradlew :composeApp:desktopTest :androidApp:testDebugUnitTest --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: androidApp/build/reports/lint-results-*.html
          if-no-files-found: ignore

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: composeApp/build/reports/tests/
          if-no-files-found: ignore
