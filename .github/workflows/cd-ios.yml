name: CD - iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: 'New internal build'

concurrency:
  group: cd-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build & Distribute iOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          supabase.project_url=${{ secrets.SUPABASE_PROJECT_URL }}
          supabase.public_api_key=${{ secrets.SUPABASE_PUBLIC_API_KEY }}
          gemini.api_key=${{ secrets.GEMINI_API_KEY }}
          google_auth_client_id=${{ secrets.GOOGLE_AUTH_CLIENT_ID }}
          powersync.url=${{ secrets.POWERSYNC_URL }}
          EOF

      - name: Validate iOS build and distribution credentials
        id: ios_distribution
        shell: bash
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          FIREBASE_APP_ID_IOS: ${{ secrets.FIREBASE_APP_ID_IOS }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
        run: |
          set -euo pipefail

          for variable_name in \
            IOS_CERTIFICATE_BASE64 \
            IOS_CERTIFICATE_PASSWORD \
            IOS_KEYCHAIN_PASSWORD \
            IOS_PROVISION_PROFILE_BASE64; do
            if [ -z "${!variable_name:-}" ]; then
              echo "can_build=false" >> "$GITHUB_OUTPUT"
              echo "can_distribute=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Skipping iOS archive and distribution because one or more iOS signing secrets are not configured."
              exit 0
            fi
          done

          echo "can_build=true" >> "$GITHUB_OUTPUT"

          can_distribute=true

          if [ -z "${FIREBASE_APP_ID_IOS:-}" ]; then
            can_distribute=false
            echo "::warning::Skipping Firebase App Distribution because FIREBASE_APP_ID_IOS is not configured."
          elif [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            can_distribute=false
            echo "::warning::Skipping Firebase App Distribution because GOOGLE_SERVICE_JSON is not configured."
          else
            firebase_service_account_type="$(ruby -rjson -e 'print(JSON.parse(ENV.fetch("FIREBASE_SERVICE_ACCOUNT_JSON")).fetch("type", ""))' 2>/dev/null || true)"

            if [ "$firebase_service_account_type" != "service_account" ]; then
              can_distribute=false
              echo "::warning::Skipping Firebase App Distribution because GOOGLE_SERVICE_JSON is not a service account credential."
            fi
          fi

          echo "can_distribute=$can_distribute" >> "$GITHUB_OUTPUT"

      # ------- Apple Code Signing -------
      - name: Install Apple Certificate
        if: steps.ios_distribution.outputs.can_build == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        if: steps.ios_distribution.outputs.can_build == 'true'
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # ------- KMP Framework -------
      # Xcode's build script calls ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode.
      # We set OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES in xcodebuild so Xcode skips
      # re-invoking Gradle, and instead we run it explicitly here first.
      - name: Build KMP Framework
        if: steps.ios_distribution.outputs.can_build == 'true'
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-daemon

      # ------- Xcode Archive -------
      - name: Archive iOS App
        if: steps.ios_distribution.outputs.can_build == 'true'
        run: |
          xcodebuild -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES \
            clean archive

      - name: Export IPA
        if: steps.ios_distribution.outputs.can_build == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload IPA Artifact
        if: steps.ios_distribution.outputs.can_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: ${{ runner.temp }}/ipa/*.ipa

      # ------- Firebase App Distribution -------
      - name: Upload to Firebase App Distribution
        if: steps.ios_distribution.outputs.can_distribute == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_IOS }}
          serviceCredentialsFileContent: ${{ secrets.GOOGLE_SERVICE_JSON }}
          groups: internal-testers
          file: ${{ runner.temp }}/ipa/iosApp.ipa
          releaseNotes: |
            ${{ github.event.inputs.release_notes || format('Build #{0} from {1}', github.run_number, github.ref_name) }}

            Commit: ${{ github.sha }}
